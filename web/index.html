<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Swarm Dashboard</title>
<style>
:root{--bg:#0a0e17;--surface:#111827;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--accent:#7c3aed;--accent-light:#a78bfa;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0720,#1a1040);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:700}
.header .status{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
.status-dot.connected{background:var(--green)}
.container{max-width:1400px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.stat-card .value{font-size:28px;font-weight:700;color:var(--accent-light)}
.stat-card .label{font-size:13px;color:var(--muted);margin-top:4px}
.main-grid{display:grid;grid-template-columns:1fr 400px;gap:24px}
@media(max-width:1000px){.main-grid{grid-template-columns:1fr}}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-header h2{font-size:15px;font-weight:600}
.panel-body{padding:16px;max-height:600px;overflow-y:auto}
.agent-card{background:#0d1117;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;transition:border-color .2s}
.agent-card:hover{border-color:var(--accent)}
.agent-card.running{border-left:3px solid var(--green)}
.agent-card.completed{border-left:3px solid var(--blue)}
.agent-card.error{border-left:3px solid var(--red)}
.agent-card.idle{border-left:3px solid var(--muted)}
.agent-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.agent-name{font-weight:600;font-size:14px}
.agent-role{font-size:11px;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:4px}
.agent-status{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.agent-status.running{background:rgba(16,185,129,.15);color:var(--green)}
.agent-status.completed{background:rgba(59,130,246,.15);color:var(--blue)}
.agent-status.error{background:rgba(239,68,68,.15);color:var(--red)}
.agent-status.idle{background:rgba(100,116,139,.15);color:var(--muted)}
.agent-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:8px}
.agent-logs{margin-top:12px;background:#080c14;border-radius:8px;padding:12px;max-height:150px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6}
.log-entry{display:flex;gap:8px}
.log-time{color:var(--muted);flex-shrink:0}
.log-level{font-weight:600;flex-shrink:0;width:45px}
.log-level.info{color:var(--blue)}
.log-level.success{color:var(--green)}
.log-level.warn{color:var(--yellow)}
.log-level.error{color:var(--red)}
.spawn-form{display:flex;flex-direction:column;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;color:var(--muted);font-weight:500}
.form-group input,.form-group select,.form-group textarea{
  padding:10px 14px;background:#0d1117;border:1px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;outline:none;font-family:inherit
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:80px;font-family:'JetBrains Mono',monospace;font-size:13px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-sm{padding:6px 12px;font-size:12px}
.agent-actions{display:flex;gap:8px;margin-top:12px}
.empty-state{text-align:center;padding:40px;color:var(--muted)}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.ws-log{background:#080c14;border-radius:8px;padding:12px;max-height:200px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;margin-top:12px}
.ws-entry{display:flex;gap:8px;padding:2px 0}
.ws-time{color:var(--muted);flex-shrink:0;font-size:10px}
.ws-type{color:var(--accent-light);flex-shrink:0;font-weight:600}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#9333ea);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px">🐝</div>
    <h1>Agent Swarm Dashboard</h1>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="value" id="totalAgents">0</div><div class="label">Total Agents</div></div>
    <div class="stat-card"><div class="value" id="runningAgents">0</div><div class="label">Running</div></div>
    <div class="stat-card"><div class="value" id="completedAgents">0</div><div class="label">Completed</div></div>
    <div class="stat-card"><div class="value" id="totalCost">$0.00</div><div class="label">Total Cost</div></div>
    <div class="stat-card"><div class="value" id="totalTokens">0</div><div class="label">Total Tokens</div></div>
  </div>

  <div class="main-grid">
    <div>
      <div class="panel">
        <div class="panel-header">
          <h2>Active Agents</h2>
          <span style="font-size:12px;color:var(--muted)" id="agentCount">0 agents</span>
        </div>
        <div class="panel-body" id="agentList">
          <div class="empty-state">
            <div class="icon">🤖</div>
            <p>No agents running</p>
            <p style="font-size:12px;margin-top:4px">Spawn an agent to get started</p>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="panel" style="margin-bottom:24px">
        <div class="panel-header"><h2>Spawn Agent</h2></div>
        <div class="panel-body">
          <div class="spawn-form">
            <div class="form-group">
              <label>Agent Name</label>
              <input type="text" id="agentName" placeholder="e.g. Code Reviewer">
            </div>
            <div class="form-group">
              <label>Role</label>
              <select id="agentRole">
                <option value="researcher">Researcher</option>
                <option value="coder">Coder</option>
                <option value="reviewer">Reviewer</option>
                <option value="writer">Writer</option>
                <option value="analyst">Analyst</option>
                <option value="tester">Tester</option>
              </select>
            </div>
            <div class="form-group">
              <label>Task Prompt</label>
              <textarea id="agentPrompt" placeholder="Describe what this agent should do..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="spawnAgent()">Spawn Agent</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>System Log</h2></div>
        <div class="panel-body">
          <div class="ws-log" id="wsLog">
            <div class="ws-entry"><span class="ws-time">--:--:--</span><span class="ws-type">INFO</span>Waiting for connection...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = window.location.origin.replace('http','ws')+'/ws';
let ws=null;
let agents={};
let reconnectTimer=null;

function connect(){
  ws=new WebSocket(WS_URL);
  ws.onopen=()=>{
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent='Connected';
    addLog('INFO','Connected to swarm hub');
    fetchAgents();
  };
  ws.onclose=()=>{
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent='Disconnected - Reconnecting...';
    addLog('WARN','Connection lost, reconnecting...');
    reconnectTimer=setTimeout(connect,3000);
  };
  ws.onerror=(e)=>{
    addLog('ERROR','WebSocket error');
  };
  ws.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);
      handleMessage(msg);
    }catch(err){
      addLog('ERROR','Failed to parse message');
    }
  };
}

function handleMessage(msg){
  switch(msg.type){
    case 'agent_update':
    case 'agent_spawned':
      agents[msg.agent.id]=msg.agent;
      renderAgents();
      addLog('INFO',`Agent ${msg.agent.name} ${msg.type==='agent_spawned'?'spawned':'updated'} (${msg.agent.status})`);
      break;
    case 'agent_stopped':
      if(agents[msg.agent.id]){
        agents[msg.agent.id].status='idle';
        renderAgents();
        addLog('WARN',`Agent ${msg.agent.name} stopped`);
      }
      break;
    case 'agent_log':
      if(agents[msg.agent_id]){
        agents[msg.agent_id].logs=agents[msg.agent_id].logs||[];
        agents[msg.agent_id].logs.push(msg.log);
        renderAgentLogs(msg.agent_id);
      }
      break;
    case 'system_status':
      updateStats(msg.stats);
      break;
    case 'error':
      addLog('ERROR',msg.message);
      break;
  }
}

function fetchAgents(){
  fetch('/api/agents').then(r=>r.json()).then(data=>{
    data.forEach(a=>agents[a.id]=a);
    renderAgents();
  }).catch(()=>{});
}

function spawnAgent(){
  const name=document.getElementById('agentName').value.trim();
  const role=document.getElementById('agentRole').value;
  const prompt=document.getElementById('agentPrompt').value.trim();
  if(!name){alert('Please enter an agent name');return}
  if(!prompt){alert('Please enter a task prompt');return}
  fetch('/api/agents',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,role,prompt})
  }).then(r=>r.json()).then(agent=>{
    document.getElementById('agentName').value='';
    document.getElementById('agentPrompt').value='';
  }).catch(()=>{});
}

function stopAgent(id){
  fetch('/api/agents/'+id,{method:'DELETE'}).catch(()=>{});
}

function steerAgent(id){
  const instruction=prompt('Enter steering instruction:');
  if(!instruction)return;
  fetch('/api/agents/'+id+'/steer',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({instruction})
  }).catch(()=>{});
}

function renderAgents(){
  const list=document.getElementById('agentList');
  const vals=Object.values(agents);
  document.getElementById('agentCount').textContent=vals.length+' agent'+(vals.length!==1?'s':'');
  if(vals.length===0){
    list.innerHTML='<div class="empty-state"><div class="icon">🤖</div><p>No agents running</p><p style="font-size:12px;margin-top:4px">Spawn an agent to get started</p></div>';
    return;
  }
  vals.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  list.innerHTML=vals.map(a=>`
    <div class="agent-card ${a.status}" id="agent-${a.id}">
      <div class="agent-header">
        <div>
          <div class="agent-name">${escapeHtml(a.name)}</div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <span class="agent-role">${escapeHtml(a.role)}</span>
            <span class="agent-status ${a.status}">${a.status}</span>
          </div>
        </div>
        <div class="agent-actions">
          ${a.status==='running'?`<button class="btn btn-sm btn-primary" onclick="steerAgent('${a.id}')">Steer</button>
          <button class="btn btn-sm btn-danger" onclick="stopAgent('${a.id}')">Stop</button>`:''}
        </div>
      </div>
      <div class="agent-meta">
        <span>Tokens: ${(a.tokens||0).toLocaleString()}</span>
        <span>Cost: $${(a.cost||0).toFixed(4)}</span>
        <span>Created: ${new Date(a.created_at).toLocaleTimeString()}</span>
      </div>
      <div class="agent-logs" id="logs-${a.id}">
        ${(a.logs||[]).map(l=>`<div class="log-entry"><span class="log-time">${new Date(l.time).toLocaleTimeString()}</span><span class="log-level ${l.level}">${l.level}</span><span>${escapeHtml(l.message)}</span></div>`).join('')||'<div style="color:var(--muted);font-size:11px">No logs yet</div>'}
      </div>
    </div>
  `).join('');
  updateStatsFromAgents();
}

function renderAgentLogs(id){
  const el=document.getElementById('logs-'+id);
  if(!el||!agents[id])return;
  const logs=agents[id].logs||[];
  el.innerHTML=logs.map(l=>`<div class="log-entry"><span class="log-time">${new Date(l.time).toLocaleTimeString()}</span><span class="log-level ${l.level}">${l.level}</span><span>${escapeHtml(l.message)}</span></div>`).join('')||'<div style="color:var(--muted);font-size:11px">No logs yet</div>';
  el.scrollTop=el.scrollHeight;
}

function updateStatsFromAgents(){
  const vals=Object.values(agents);
  document.getElementById('totalAgents').textContent=vals.length;
  document.getElementById('runningAgents').textContent=vals.filter(a=>a.status==='running').length;
  document.getElementById('completedAgents').textContent=vals.filter(a=>a.status==='completed').length;
  document.getElementById('totalCost').textContent='$'+vals.reduce((s,a)=>s+(a.cost||0),0).toFixed(4);
  document.getElementById('totalTokens').textContent=vals.reduce((s,a)=>s+(a.tokens||0),0).toLocaleString();
}

function updateStats(stats){
  if(stats.total_agents!==undefined)document.getElementById('totalAgents').textContent=stats.total_agents;
  if(stats.running!==undefined)document.getElementById('runningAgents').textContent=stats.running;
  if(stats.completed!==undefined)document.getElementById('completedAgents').textContent=stats.completed;
  if(stats.total_cost!==undefined)document.getElementById('totalCost').textContent='$'+stats.total_cost.toFixed(4);
  if(stats.total_tokens!==undefined)document.getElementById('totalTokens').textContent=stats.total_tokens.toLocaleString();
}

function addLog(type,msg){
  const el=document.getElementById('wsLog');
  const time=new Date().toLocaleTimeString();
  const div=document.createElement('div');
  div.className='ws-entry';
  div.innerHTML=`<span class="ws-time">${time}</span><span class="ws-type">${type}</span>${escapeHtml(msg)}`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
  if(el.children.length>100)el.removeChild(el.firstChild);
}

function escapeHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

connect();
</script>
</body>
</html>
